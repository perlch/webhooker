<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webhook Management Interface</title>
    <style>
        :root {
            --bg-primary: #313338;
            --bg-secondary: #2b2d31;
            --bg-input: #1e1f22;
            --text-primary: #dbdee1;
            --text-secondary: #b5bac1;
            --accent-color: #5865f2;
            --accent-hover: #4752c4;
            --status-success: #23a559;
            --status-error: #fa777a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        .app-container {
            background-color: var(--bg-secondary);
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        h2 { text-align: center; margin-bottom: 8px; font-size: 22px; font-weight: 600; }
        p { text-align: center; color: var(--text-secondary); font-size: 14px; margin-bottom: 24px; }

        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            text-transform: uppercase; 
            font-size: 12px; 
            font-weight: 700; 
            color: var(--text-secondary); 
            margin-bottom: 8px; 
        }

        input, textarea {
            width: 100%;
            background-color: var(--bg-input);
            border: none;
            border-radius: 4px;
            color: var(--text-primary);
            padding: 12px;
            font-size: 15px;
            outline: none;
        }

        textarea { resize: none; height: 120px; }

        button {
            width: 100%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: var(--accent-hover); }

        #response-status {
            margin-top: 20px;
            text-align: center;
            font-size: 13px;
            font-weight: 500;
            min-height: 1.2em;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>Welcome Back</h2>
    <p>Please enter the webhook credentials</p>

    <div class="form-group">
        <label>Webhook URL</label>
        <input type="text" id="webhookUrl" placeholder="Enter endpoint URL">
    </div>

    <div class="form-group">
        <label>Message Content</label>
        <textarea id="messageContent" placeholder="Enter message payload"></textarea>
    </div>

    <button onclick="executeWebhook()">Submit Request</button>
    <div id="response-status"></div>
</div>

<script>
    async function executeWebhook() {
        const endpoint = document.getElementById('webhookUrl').value;
        const payload = document.getElementById('messageContent').value;
        const statusDisplay = document.getElementById('response-status');

        if (!endpoint || !payload) {
            statusDisplay.style.color = 'var(--status-error)';
            statusDisplay.innerText = 'Required fields are missing.';
            return;
        }

        try {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: payload })
            });

            if (response.ok) {
                statusDisplay.style.color = 'var(--status-success)';
                statusDisplay.innerText = 'Data transmitted successfully.';
                document.getElementById('messageContent').value = '';
            } else {
                throw new Error();
            }
        } catch (error) {
            statusDisplay.style.color = 'var(--status-error)';
            statusDisplay.innerText = 'Transmission failed. Verify URL integrity.';
        }
    }
</script>

</body>
</html>
